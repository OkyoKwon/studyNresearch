      - 용인플랫폼시티:
          - 개요: domains/yongin-platform-city/index.md
          - 핵심 개념: domains/yongin-platform-city/concepts.md
          - 주변 프로젝트 비교: domains/yongin-platform-city/products/index.md
          - 개발 현황·투자 분석: domains/yongin-platform-city/trends.md
  - 가이드:
      - 도메인 추가 가이드: guide/add-domain.md
      - AI 프롬프트 템플릿: guide/ai-templates.md
  - 태그 색인: tags.md

plugins:
  - search:
      lang: ko
  - tags:
      tags_file: tags.md
  - mermaid2

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css
  - stylesheets/mermaid-fix.css

extra_javascript:
  - javascripts/tabs-dropdown.js

copyright: Copyright &copy; 2025 Okyo

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/OkyoKwon/studyNresearch

site_name: "Okyo's Domain Wiki"
site_description: "결제, 디지털 자산, 규제, 비즈니스 모델, 부동산 등 도메인 지식을 정리하는 개인 위키"
site_url: "https://okyokwon.github.io/studyNresearch/"
docs_dir: docs

theme:
  name: material
  custom_dir: docs/overrides
  language: ko
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.tabs.link

nav:
  - 홈: index.md
  - 결제/금융 인프라:
      - categories/payment/index.md
      - PG (Payment Gateway):
          - 개요: domains/pg-service/index.md
          - 핵심 개념: domains/pg-service/concepts.md
          - 결제 플로우: domains/pg-service/payment-flow.md
          - 대표 제품:
              - 비교 개요: domains/pg-service/products/index.md
              - Stripe: domains/pg-service/products/stripe.md
              - Toss Payments: domains/pg-service/products/toss-payments.md
              - NHN KCP: domains/pg-service/products/nhn-kcp.md
          - 트렌드: domains/pg-service/trends.md
      - MOR (Merchant of Record):
          - 개요: domains/mor-service/index.md
          - 핵심 개념: domains/mor-service/concepts.md
          - PG vs MOR 비교: domains/mor-service/pg-vs-mor.md
          - 대표 제품:
              - 비교 개요: domains/mor-service/products/index.md
              - Paddle: domains/mor-service/products/paddle.md
              - Lemon Squeezy: domains/mor-service/products/lemon-squeezy.md
              - FastSpring: domains/mor-service/products/fastspring.md
          - 트렌드: domains/mor-service/trends.md
      - 오픈뱅킹 / BaaS:
          - 개요: domains/open-banking/index.md
          - 핵심 개념: domains/open-banking/concepts.md
          - 대표 제품:
              - 비교 개요: domains/open-banking/products/index.md
              - Plaid: domains/open-banking/products/plaid.md
              - Unit: domains/open-banking/products/unit.md
              - 한국 오픈뱅킹: domains/open-banking/products/korea-openbanking.md
          - 트렌드: domains/open-banking/trends.md
      - BNPL (Buy Now Pay Later):
          - 개요: domains/bnpl/index.md
          - 핵심 개념: domains/bnpl/concepts.md
          - 대표 제품:
              - 비교 개요: domains/bnpl/products/index.md
              - Klarna: domains/bnpl/products/klarna.md
              - Afterpay: domains/bnpl/products/afterpay.md
              - 네이버페이 후결제: domains/bnpl/products/naverpay.md
          - 트렌드: domains/bnpl/trends.md
      - 임베디드 금융 (Embedded Finance):
          - 개요: domains/embedded-finance/index.md
          - 핵심 개념: domains/embedded-finance/concepts.md
          - 대표 제품:
              - 비교 개요: domains/embedded-finance/products/index.md
              - Stripe Treasury: domains/embedded-finance/products/stripe-treasury.md
              - Shopify Balance: domains/embedded-finance/products/shopify-balance.md
              - Unit: domains/embedded-finance/products/unit.md
          - 트렌드: domains/embedded-finance/trends.md
      - 실시간 결제 인프라:
          - 개요: domains/realtime-payment/index.md
          - 핵심 개념: domains/realtime-payment/concepts.md
          - 대표 시스템:
              - 비교 개요: domains/realtime-payment/products/index.md
              - FedNow: domains/realtime-payment/products/fednow.md
              - UPI (인도): domains/realtime-payment/products/upi.md
              - PIX (브라질): domains/realtime-payment/products/pix.md
          - 트렌드: domains/realtime-payment/trends.md
  - 디지털 자산/Web3:
      - categories/web3/index.md
      - 가상자산 규제:
          - 개요: domains/crypto-regulation/index.md
          - 규제 프레임워크: domains/crypto-regulation/frameworks.md
          - 국가별 현황:
              - 개요: domains/crypto-regulation/by-country/index.md
              - 한국: domains/crypto-regulation/by-country/korea.md
              - 미국: domains/crypto-regulation/by-country/usa.md
              - EU: domains/crypto-regulation/by-country/eu.md
          - 관련 기관: domains/crypto-regulation/authorities.md
          - 트렌드: domains/crypto-regulation/trends.md
      - 스테이블코인 규제:

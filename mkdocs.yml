          - 핵심 개념: domains/cbdc/concepts.md
          - 주요 프로젝트:
              - 비교 개요: domains/cbdc/products/index.md
              - 디지털 원화: domains/cbdc/products/digital-won.md
              - e-CNY (중국): domains/cbdc/products/e-cny.md

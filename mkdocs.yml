              - Uniswap: domains/defi/products/uniswap.md
              - Aave: domains/defi/products/aave.md
              - MakerDAO: domains/defi/products/makerdao.md
          - 트렌드: domains/defi/trends.md
  - 규제/컴플라이언스:
      - categories/compliance/index.md
      - AML/KYC:
          - 개요: domains/aml-kyc/index.md
          - 핵심 개념: domains/aml-kyc/concepts.md
          - 대표 솔루션:
              - 비교 개요: domains/aml-kyc/products/index.md
              - Chainalysis: domains/aml-kyc/products/chainalysis.md
              - Jumio: domains/aml-kyc/products/jumio.md
              - Sumsub: domains/aml-kyc/products/sumsub.md
          - 트렌드: domains/aml-kyc/trends.md
      - 데이터 규제 (개인정보):
          - 개요: domains/data-regulation/index.md
          - 핵심 개념: domains/data-regulation/concepts.md
          - 주요 규제:

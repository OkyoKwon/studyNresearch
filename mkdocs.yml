      - 레그테크 (RegTech):
          - 개요: domains/regtech/index.md
          - 핵심 개념: domains/regtech/concepts.md
          - 대표 솔루션:
              - 비교 개요: domains/regtech/products/index.md
              - ComplyAdvantage: domains/regtech/products/complyadvantage.md
              - Sumsub: domains/regtech/products/sumsub.md
              - Chainalysis KYT: domains/regtech/products/chainalysis-kyt.md
